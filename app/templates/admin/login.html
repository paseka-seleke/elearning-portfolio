{% extends "admin/admin_base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}

<div class="mx-auto max-w-sm">
  <div class="text-center">
    <p class="text-xs font-700 uppercase tracking-[0.2em] text-accent">Admin</p>
    <h1 class="mt-2 font-display text-2xl font-700">Sign in to write a post</h1>
  </div>

  {% if error %}
  <p class="mt-6 rounded-[1.15rem] border border-accent/30 bg-accent/10 px-4 py-3 text-sm font-600 text-accent">{{ error }}</p>
  {% endif %}

  <form method="post" action="/admin/login" class="mt-6 space-y-4 rounded-[1.5rem] border border-line bg-panel p-6 shadow-soft">
    <label class="block">
      <span class="text-[11px] font-700 uppercase tracking-[0.18em] text-slate2">Username</span>
      <input name="username" autocomplete="username" required autofocus
             class="mt-2 w-full rounded-[1.15rem] border border-line bg-white px-4 py-3 text-sm focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20">
    </label>
    <label class="block">
      <span class="text-[11px] font-700 uppercase tracking-[0.18em] text-slate2">Password</span>
      <input name="password" type="password" autocomplete="current-password" required
             class="mt-2 w-full rounded-[1.15rem] border border-line bg-white px-4 py-3 text-sm focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20">
    </label>
    <button type="submit"
            class="w-full rounded-full bg-ink px-6 py-3 text-sm font-700 text-white transition-colors hover:bg-ink2">
      Log in
    </button>
  </form>
</div>
{% endblock %}
