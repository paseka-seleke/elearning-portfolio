<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} | {{ SITE.name }}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/static/brand/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#243B30", ink2: "#365246", accent: "#B75A43", warm: "#D29A31",
            mist: "#F4EEDC", slate2: "#66756F", line: "#D8CFB8", panel: "#FFFDF7", sand: "#EADDBD",
          },
          fontFamily: {
            display: ["Space Grotesk", "system-ui", "sans-serif"],
            body: ["Manrope", "system-ui", "sans-serif"],
          },
          boxShadow: {
            soft: "0 1px 2px rgba(20,34,53,.04), 0 16px 36px rgba(20,34,53,.08)",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen font-body bg-mist text-ink antialiased">

  {% if request.session.get('admin') %}
  <header class="sticky top-0 z-40 border-b border-line bg-panel/95">
    <div class="mx-auto flex h-16 max-w-5xl items-center justify-between gap-4 px-5">
      <a href="/admin" class="font-display text-base font-700 tracking-tight">Admin · {{ SITE.name.split(' - ')[0] }}</a>
      <nav class="flex items-center gap-4 text-sm font-600 text-slate2">
        <a href="/admin" class="hover:text-ink">Posts</a>
        <a href="/admin/posts/new" class="hover:text-ink">New post</a>
        <a href="/" class="hover:text-ink">View site</a>
        <a href="/admin/logout" class="rounded-full border border-line px-3 py-1.5 text-ink transition-colors hover:border-accent hover:text-accent">Log out</a>
      </nav>
    </div>
  </header>
  {% endif %}

  <main class="mx-auto max-w-5xl px-5 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
